apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-api
  namespace: devops
  labels:
    app: employee-api
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee-api

  # Rolling update strategy — zero downtime deployments
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # one extra pod during update
      maxUnavailable: 0  # never reduce below desired count

  template:
    metadata:
      labels:
        app: employee-api
    spec:
      containers:
        - name: employee-api
          image: employee-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

          # Load config from ConfigMap
          envFrom:
            - configMapRef:
                name: employee-api-config

          # Resource limits
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"

          # Readiness — when to send traffic
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          # Liveness — when to restart
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
