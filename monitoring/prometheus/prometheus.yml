global:
  scrape_interval:     15s   # scrape every 15 seconds
  evaluation_interval: 15s   # evaluate alert rules every 15s
  external_labels:
    monitor: 'devops-pipeline'
    environment: 'local'

# Alert rules file
rule_files:
  - "alert_rules.yml"

# ── SCRAPE TARGETS ─────────────────────────────────────
scrape_configs:

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Your Spring Boot app (via Actuator)
  - job_name: 'employee-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.minikube.internal:8081']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'employee-api'

  # Node Exporter (OS metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.minikube.internal:9100']

  # Kubernetes API server
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ['devops']
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
